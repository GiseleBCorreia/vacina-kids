<ion-header>
  <ion-toolbar color="primary">
    <ion-title>VacinaKids</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <h2>Olá, Gisele 👋</h2>
  <p>Acompanhe a situação vacinal da sua família.</p>

  <ion-card button routerLink="/tabs/children">
    <ion-card-header>
      <ion-card-title>👧 Crianças cadastradas</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ childrenCount }} crianças acompanhadas
    </ion-card-content>
  </ion-card>

  <ion-card button routerLink="/tabs/children">
    <ion-card-header>
      <ion-card-title>⚠️ Pendências</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ totalPending }} vacinas precisam de atenção
    </ion-card-content>
  </ion-card>

  <ion-card button routerLink="/tabs/campaigns">
    <ion-card-header>
      <ion-card-title>📢 Campanhas ativas</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ campaignCount }} campanha disponível
    </ion-card-content>
  </ion-card>

</ion-content>
