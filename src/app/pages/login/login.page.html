<ion-content scroll-y="true" style="--background: #fafaf7;">
  <div style="display: flex; flex-direction: column; align-items: center; padding: 32px; min-height: 100%;">

    <img src="/assets/family.png" style="width: 180px; margin-bottom: 24px; object-fit: contain;">

    <h2 style="color: #473C33; margin-bottom: 4px;">Bem-vindo de volta!</h2>
    <p style="color: #473C33; opacity: 0.6; margin-top: 0; margin-bottom: 32px;">Acesse sua conta</p>

    <ion-item style="width: 100%; border-radius: 12px; margin-bottom: 12px;">
      <ion-label position="stacked">E-mail</ion-label>
      <ion-input [(ngModel)]="email" type="email" placeholder="seu@email.com"></ion-input>
    </ion-item>

    <ion-item style="width: 100%; border-radius: 12px; margin-bottom: 24px;">
      <ion-label position="stacked">Senha</ion-label>
      <ion-input [(ngModel)]="password" type="password" placeholder="••••••••"></ion-input>
    </ion-item>

    <p *ngIf="errorMsg" style="color: #FDA769; margin-bottom: 12px;">{{ errorMsg }}</p>

    <ion-button expand="block" style="width: 100%; margin-bottom: 12px;" (click)="login()">
      Entrar
    </ion-button>

    <ion-button expand="block" fill="clear" routerLink="/welcome" style="width: 100%;">
      Voltar
    </ion-button>

  </div>
</ion-content>
